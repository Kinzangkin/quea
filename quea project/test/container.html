<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 30px;
    }
    .object-cont {
      border: 1px solid #ddd;
      padding: 10px;
      width: 200px;
      text-align: center;
    }
    .object-cont img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Container</h1>
  <div class="container">
    <!-- Objects will be dynamically added here -->
  </div>

  <script src="script.js"></script>
</body>
</html>
